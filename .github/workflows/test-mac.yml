name: Test macOS

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Smoke-test (imports + menu + iconen)
        run: |
          python dictate_tray.py --selftest
          echo "Selftest geslaagd"
