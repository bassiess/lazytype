name: Build macOS

on:
  workflow_dispatch:          # handmatig starten via GitHub → Actions
  push:
    tags: ['v*']              # automatisch bij bijv. git tag v1.0.1 && git push --tags

jobs:
  build:
    runs-on: macos-latest     # Apple Silicon (arm64) — kortste wachtrij; Intel-Macs via Rosetta 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installeer dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Genereer iconen
        run: python dictate_tray.py --make-icons || true

      - name: Bouw Lazytype.app
        run: |
          ICON_ARG=""
          [ -f icon.icns ] && ICON_ARG="--icon icon.icns"
          python -m PyInstaller --noconfirm --clean --windowed \
            --name Lazytype \
            $ICON_ARG \
            --osx-bundle-identifier com.lazytype \
            --collect-all sounddevice \
            --collect-all pystray \
            --hidden-import pynput.keyboard._darwin \
            --hidden-import pynput.mouse._darwin \
            dictate_tray.py

      - name: Info.plist aanvullen (mic-permissie, versie) + ad-hoc her-signeren
        run: |
          PLIST="dist/Lazytype.app/Contents/Info.plist"
          VERSION=$(python -c "import json;print(json.load(open('site/version.json'))['version'])")
          PB=/usr/libexec/PlistBuddy
          # Microfoon-toestemming: ZONDER deze sleutel weigert/kilt macOS (TCC) de app
          # zodra hij de microfoon opent → dicteren werkt niet op Mac.
          $PB -c "Delete :NSMicrophoneUsageDescription" "$PLIST" 2>/dev/null || true
          $PB -c "Add :NSMicrophoneUsageDescription string 'Lazytype gebruikt je microfoon om je spraak om te zetten naar tekst.'" "$PLIST"
          # Apple Events: voor context-bewuste toon (osascript leest de actieve app).
          $PB -c "Delete :NSAppleEventsUsageDescription" "$PLIST" 2>/dev/null || true
          $PB -c "Add :NSAppleEventsUsageDescription string 'Lazytype stemt de schrijfstijl af op de app waarin je dicteert.'" "$PLIST"
          # Versienummer (stond op 0.0.0 in de crash-reports).
          $PB -c "Set :CFBundleShortVersionString $VERSION" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleShortVersionString string $VERSION" "$PLIST"
          $PB -c "Set :CFBundleVersion $VERSION" "$PLIST" 2>/dev/null || $PB -c "Add :CFBundleVersion string $VERSION" "$PLIST"
          plutil -lint "$PLIST"
          # Info.plist gewijzigd → ad-hoc handtekening opnieuw zetten (anders ongeldig).
          codesign --force --deep --sign - dist/Lazytype.app
          codesign --verify --deep --strict dist/Lazytype.app && echo "codesign OK"
          echo "Mic-key: $($PB -c 'Print :NSMicrophoneUsageDescription' "$PLIST")"
          echo "Versie:  $($PB -c 'Print :CFBundleShortVersionString' "$PLIST")"

      - name: Smoke-test gebouwde app
        run: dist/Lazytype.app/Contents/MacOS/Lazytype --selftest

      - name: Maak DMG (met sleep-naar-Programma's)
        run: |
          rm -rf dmg_stage
          mkdir -p dmg_stage
          cp -R dist/Lazytype.app dmg_stage/
          ln -s /Applications dmg_stage/Applications
          # hdiutil geeft op CI-runners soms transient 'Resource busy' → retry.
          for i in 1 2 3 4 5; do
            rm -f dist/Lazytype.dmg
            if hdiutil create -volname "Lazytype" -srcfolder dmg_stage \
                 -fs HFS+ -ov -format UDZO dist/Lazytype.dmg; then
              echo "DMG gemaakt (poging $i)"; break
            fi
            echo "hdiutil poging $i mislukt — 5s wachten en opnieuw…"; sleep 5
          done
          test -f dist/Lazytype.dmg

      - name: Kopieer naar site/downloads
        run: |
          mkdir -p site/downloads
          cp dist/Lazytype.dmg site/downloads/Lazytype.dmg

      - name: Upload artifact (90 dagen beschikbaar)
        uses: actions/upload-artifact@v4
        with:
          name: Lazytype-macOS
          path: dist/Lazytype.dmg
          retention-days: 90

      - name: Voeg toe aan GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Lazytype.dmg
